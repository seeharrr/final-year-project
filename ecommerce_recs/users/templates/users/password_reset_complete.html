{% extends 'base.html' %}

{% block title %}Password Reset Complete | RecSys{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4 text-center">
                <div class="mb-4 text-success">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-shield-check" viewBox="0 0 16 16">
                      <path d="M5.338 1.59a59.768 59.768 0 0 0-2.836.856.845.845 0 0 0-.502.775v5.526c0 4.195 3.013 8.163 6.002 9.497 2.99-1.334 6.002-5.302 6.002-9.497V3.221a.845.845 0 0 0-.502-.775 59.768 59.768 0 0 0-2.836-.856C9.176 1.096 8.542 1 8 1s-1.176.096-2.662.59zM8 14.532c-2.435-1.1-4.71-4.148-4.71-8.25V3.41c1.378-.45 2.875-.76 4.71-.853 1.835.094 3.332.404 4.71.853v2.872c0 4.102-2.275 7.15-4.71 8.25z"/>
                      <path d="M10.854 5.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 7.793l2.646-2.647a.5.5 0 0 1 .708 0z"/>
                    </svg>
                </div>
                <h3 class="mb-3">Password changed!</h3>
                <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
                <div class="mt-4">
                    <a href="{% url 'login' %}" class="btn btn-primary">Log in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

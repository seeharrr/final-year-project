{% extends 'base.html' %}

{% block title %}Reset Password | RecSys{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Reset Password</h3>
                <p class="text-muted text-center mb-4">Forgotten your password? Enter your email address below, and we'll email instructions for setting a new one.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email address</label>
                        <input type="email" name="{{ form.email.name }}" id="{{ form.email.id_for_label }}" class="form-control" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Email</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
